<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>베이 아카이브 - 베이블레이드 도감</title>
    <style>
      @font-face {
        font-family: "Pretendard Variable";
        font-style: normal;
        font-weight: 45 920;
        font-display: block;
        src: url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/woff2/PretendardVariable.woff2") format("woff2");
      }
      html {
        font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body { margin: 0; }
      button, input, select, textarea { font-family: inherit; }
    </style>
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/woff2/PretendardVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  <link rel="stylesheet" href="./styles.css?v=20260616-dropdown-polish" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <a class="brand" href="#" data-home>
        <span class="brand-mark">B</span>
        <span><b>베이</b> 아카이브</span>
      </a>
      <nav class="nav">
        <div class="nav-group">
          <button class="nav-link" data-toy-section="product">제품</button>
          <div class="nav-submenu nav-filter-menu" id="productFilters">
            <button class="sub-filter active" type="button" data-product-filter="일반 판매">일반</button>
            <div class="filter-group">
              <button class="sub-filter" type="button" data-product-filter-group="limited">한정</button>
              <div class="filter-submenu">
                <button class="sub-filter" type="button" data-product-filter="한정 판매">한정 판매</button>
                <button class="sub-filter" type="button" data-product-filter="한정 배포">한정 배포</button>
              </div>
            </div>
            <button class="sub-filter" type="button" data-product-filter="게임">게임</button>
          </div>
        </div>
        <div class="nav-group">
          <button class="nav-link" data-toy-section="bey">베이</button>
          <div class="nav-submenu nav-filter-menu" id="filters">
            <div class="filter-group">
              <button class="sub-filter active" data-filter-group="bey">베이</button>
              <div class="filter-submenu">
                <button class="sub-filter" data-filter="bey" data-structure="basic">기본</button>
                <button class="sub-filter" data-filter="bey" data-structure="hybrid">하이브리드</button>
                <button class="sub-filter" data-filter="bey" data-structure="4d">4D</button>
                <button class="sub-filter" data-filter="bey" data-structure="synchrom">제로G</button>
              </div>
            </div>
            <div class="filter-group">
              <button class="sub-filter" data-filter-group="face">페이스</button>
              <div class="filter-submenu">
                <button class="sub-filter" data-filter="face">페이스</button>
                <button class="sub-filter" data-filter="stoneface">스톤페이스</button>
              </div>
            </div>
            <div class="filter-group">
              <button class="sub-filter" data-filter-group="wheel">휠</button>
              <div class="filter-submenu">
                <button class="sub-filter" data-filter="wheel">휠</button>
                <button class="sub-filter" data-filter="clearwheel">클리어휠</button>
                <button class="sub-filter" data-filter="lightwheel">라이트휠</button>
                <button class="sub-filter" data-filter="metalwheel">메탈휠</button>
                <button class="sub-filter" data-filter="chromewheel">크롬휠</button>
                <button class="sub-filter" data-filter="crystalwheel">크리스탈휠</button>
              </div>
            </div>
            <button class="sub-filter" data-filter="track">트랙</button>
            <div class="filter-group">
              <button class="sub-filter" data-filter-group="bottom">버텀</button>
              <div class="filter-submenu">
                <button class="sub-filter" data-filter="bottom">버텀</button>
                <button class="sub-filter" data-filter="fourdbottom">4D버텀</button>
              </div>
            </div>
          </div>
        </div>
        <div class="nav-group">
          <button class="nav-link" data-toy-section="equipment">장비</button>
          <div class="nav-submenu nav-filter-menu" id="equipmentFilters">
            <button class="sub-filter active" type="button" data-equipment-filter="런처">런처</button>
            <button class="sub-filter" type="button" data-equipment-filter="그립">그립</button>
            <button class="sub-filter" type="button" data-equipment-filter="스타디움">스타디움</button>
            <button class="sub-filter" type="button" data-equipment-filter="기타">기타</button>
          </div>
        </div>
      </nav>
      <button class="menu-button" id="menuButton" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main>
      <section class="catalog-section active" id="catalogContent">
        <div class="toy-panel active overview-panel" data-toy-panel="overview">
          <div class="overview-hero">
            <h2>구조</h2>
          </div>

          <section class="overview-entry">
            <button class="overview-open-card" id="overviewStructureOpen" type="button">
              <span>구조</span>
              <strong>시리즈별 완구 구조</strong>
              <small>4단 구조, 하이브리드, 4D, 싱크롬 시스템 보기</small>
              <b aria-hidden="true">→</b>
            </button>
          </section>
        </div>

        <div class="toy-panel" data-toy-panel="product">
          <div class="section-heading">
            <div>
              <p class="eyebrow">&nbsp;</p>
              <h2>제품</h2>
              <p class="section-copy">&nbsp;</p>
            </div>
            <p class="result-count"><b id="productCount">0</b>개 항목</p>
          </div>
          <div class="toolbar">
            <div class="catalog-dropdowns" id="productDropdownFilters" aria-label="제품 필터">
              <details class="catalog-dropdown">
                <summary><span>종류</span><b class="catalog-dropdown-value">전체</b></summary>
                <div class="catalog-dropdown-menu">
                  <button type="button" class="active" data-product-kind="">전체</button>
                  <button type="button" data-product-kind="리미티드스타터세트">리미티드스타터세트</button>
                  <button type="button" data-product-kind="스타터세트">스타터세트</button>
                  <button type="button" data-product-kind="부스터">부스터</button>
                  <button type="button" data-product-kind="랜덤부스터">랜덤부스터</button>
                  <button type="button" data-product-kind="세트">세트</button>
                  <button type="button" data-product-kind="런처">런처</button>
                  <button type="button" data-product-kind="그립">그립</button>
                  <button type="button" data-product-kind="스타디움">스타디움</button>
                  <button type="button" data-product-kind="게임">게임</button>
                  <button type="button" data-product-kind="기타">기타</button>
                </div>
              </details>
              <details class="catalog-dropdown">
                <summary><span>비고</span><b class="catalog-dropdown-value">선택 안 함</b></summary>
                <div class="catalog-dropdown-menu">
                  <button type="button" class="active" data-product-note="">선택 안 함</button>
                  <button type="button" data-product-note="한정 판매">한정 판매</button>
                  <button type="button" data-product-note="한정 배포">한정 배포</button>
                  <button type="button" data-product-note="포인트 교환">포인트 교환</button>
                  <button type="button" data-product-note="국내 미발매">국내 미발매</button>
                </div>
              </details>
            </div>
            <label class="search-box">
              <span aria-hidden="true"></span>
              <input id="productSearch" type="search" placeholder="제품 검색" />
            </label>
          </div>
          <div class="gear-grid product-grid" id="productGrid"></div>
        </div>

        <div class="toy-panel" data-toy-panel="bey">
          <div class="section-heading">
          <div>
            <h2>베이</h2>
          </div>
          <p class="result-count"><b id="resultCount">0</b>개 항목</p>
          </div>

          <div class="toolbar">
          <div class="catalog-dropdowns" id="gearDropdownFilters" aria-label="베이와 부품 필터">
            <details class="catalog-dropdown">
              <summary><span>종류</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-kind="">전체</button>
                <button type="button" data-gear-kind="bey">베이</button>
                <button type="button" data-gear-kind="face">페이스</button>
                <button type="button" data-gear-kind="wheel">휠</button>
                <button type="button" data-gear-kind="track">트랙</button>
                <button type="button" data-gear-kind="bottom">버텀</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="system" hidden>
              <summary><span>시스템</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-system="">전체</button>
                <button type="button" data-gear-system="basic">4단 구조</button>
                <button type="button" data-gear-system="hybrid">하이브리드</button>
                <button type="button" data-gear-system="4d">4D</button>
                <button type="button" data-gear-system="synchrom">싱크롬</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="face-subtype" hidden>
              <summary><span>세부</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-subtype="">전체</button>
                <button type="button" data-gear-subtype="face">페이스</button>
                <button type="button" data-gear-subtype="stoneface">스톤페이스</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="wheel-subtype" hidden>
              <summary><span>세부</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-subtype="">전체</button>
                <button type="button" data-gear-subtype="wheel">휠</button>
                <button type="button" data-gear-subtype="clearwheel">클리어휠</button>
                <button type="button" data-gear-subtype="lightwheel">라이트휠</button>
                <button type="button" data-gear-subtype="metalwheel">메탈휠</button>
                <button type="button" data-gear-subtype="chromewheel">크롬휠</button>
                <button type="button" data-gear-subtype="crystalwheel">크리스탈휠</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="bottom-subtype" hidden>
              <summary><span>세부</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-subtype="">전체</button>
                <button type="button" data-gear-subtype="bottom">버텀</button>
                <button type="button" data-gear-subtype="fourdbottom">4D버텀</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="type" hidden>
              <summary><span>타입</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-type="">전체</button>
                <button type="button" data-gear-type="ATTACK">공격형</button>
                <button type="button" data-gear-type="DEFENSE">방어형</button>
                <button type="button" data-gear-type="STAMINA">지구형</button>
                <button type="button" data-gear-type="BALANCE">균형형</button>
              </div>
            </details>
            <details class="catalog-dropdown" data-gear-dependent="spin" hidden>
              <summary><span>회전</span><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-gear-spin="">전체</button>
                <button type="button" data-gear-spin="RIGHT SPIN">우회전</button>
                <button type="button" data-gear-spin="LEFT SPIN">좌회전</button>
                <button type="button" data-gear-spin="DUAL SPIN">양회전</button>
              </div>
            </details>
          </div>
          <label class="search-box">
            <span aria-hidden="true"></span>
            <input id="searchInput" type="search" placeholder="베이 또는 부품 검색" />
          </label>
          </div>
          <div class="gear-grid" id="gearGrid"></div>
        </div>

        <div class="toy-panel" data-toy-panel="equipment">
          <div class="section-heading">
            <div>
              <p class="eyebrow">&nbsp;</p>
              <h2>장비</h2>
              <p class="section-copy">&nbsp;</p>
            </div>
            <p class="result-count"><b id="equipmentCount">0</b>개 항목</p>
          </div>
          <div class="toolbar">
            <div class="catalog-dropdowns" id="equipmentDropdownFilters" aria-label="장비 필터">
              <details class="catalog-dropdown">
                <summary><span>종류</span><b class="catalog-dropdown-value">전체</b></summary>
                <div class="catalog-dropdown-menu">
                  <button type="button" class="active" data-equipment-kind="">전체</button>
                  <button type="button" data-equipment-kind="런처">런처</button>
                  <button type="button" data-equipment-kind="그립">그립</button>
                  <button type="button" data-equipment-kind="스타디움">스타디움</button>
                  <button type="button" data-equipment-kind="기타">기타</button>
                </div>
              </details>
            </div>
            <label class="search-box">
              <span aria-hidden="true"></span>
              <input id="equipmentSearch" type="search" placeholder="장비 검색" />
            </label>
          </div>
          <div class="gear-grid product-grid" id="equipmentGrid"></div>
        </div>
      </section>

    </main>

    <dialog id="detailModal">
      <button class="modal-close" id="modalClose" aria-label="상세 닫기">×</button>
      <div id="modalContent"></div>
    </dialog>

    <footer>
      <a class="brand" href="#"><span class="brand-mark">B</span><span><b>베이</b> 아카이브</span></a>
      <p> 블레이더를 위한 비공식 팬 아카이브</p>
    </footer>
    <button class="to-top" id="toTop" type="button" aria-label="맨 위로 이동">↑</button>
  <script src="./app.js?v=20260616-dropdown-polish"></script>
  </body>
</html>
